    <main class="main">
    <section class="container section">
        <h1>Отзывы</h1>
        <p class="muted">
            Оставьте отзыв о нашей парикмахерской или, если у вас есть какие-либо вопросы, вым можете их задать.
        </p>

        <div class="grid-4">
            <div class="card1">
                <h2>Связаться</h2>
                <form id="contactForm" class="form">
                    <label>
                        Имя
                        <input name="name" type="text" placeholder="Например: Аня" required>
                    </label>

                    <label>
                        Тема 
                        <select name="topic" required>
                            <option value="">Выберите_</option>
                            <option>Вопрос</option>
                            <option>Отзыв</option>
                        </select>
                    </label>

                    <label>
                        Сообщение
                        <textarea name="message" rows="4" placeholder="Напишите сообщение_" required></textarea>
                    </label>

                    <button class="btn" type="submit">Сохранить сообщение</button>
                    <button class="btn btn--ghost" id="clearMsgsBtn" type="button">Очистить</button>

                </form>

            </div>

            <div class="card1">
                <h2>Сохраненные сообщения</h2>
                <div id="msgs" class="msgs muted">Пока пусто.</div>
            </div>
        </div>
    </section>
